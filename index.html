<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Slides</title>
  <style>
    @font-face {
      src: url("assets/fonts/Nunito-Regular.ttf") format("truetype");
      font-family: "Nunito";
      font-weight: 400;
      font-style: normal;
    }
    @font-face {
      src: url("assets/fonts/Nunito-Bold.ttf") format("truetype");
      font-family: "Nunito";
      font-weight: 700;
      font-style: normal;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: "Nunito", sans-serif;
      background: #e6e7ed;
      color: #2b3048;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 3rem 1.5rem;
    }

    header {
      margin-bottom: 2.5rem;
      text-align: center;
    }

    header h1 {
      font-size: 2rem;
      font-weight: 700;
      color: #8c4351;
    }

    header p {
      margin-top: 0.4rem;
      color: #6c6e75;
    }

    ul {
      list-style: none;
      display: flex;
      flex-direction: column;
      gap: 1rem;
      width: 100%;
      max-width: 560px;
    }

    li a {
      display: block;
      padding: 1rem 1.4rem;
      background: #d7d9e2;
      border: 1px solid #c8cbd8;
      border-radius: 8px;
      text-decoration: none;
      color: #2959aa;
      font-weight: 700;
      font-size: 1.05rem;
      transition: background 0.15s, border-color 0.15s;
    }

    li a:hover {
      background: #c8cbd8;
      border-color: #8c4351;
      color: #8c4351;
    }
  </style>
</head>
<body>
  <header>
    <h1>Slides</h1>
    <p>A collection of presentation slides.</p>
  </header>
  <ul>
    <li><a href="deterministic-builds-with-nix/">Deterministic Builds with Nix</a></li>
    <li><a href="do-you-want-to-build-a-snowflake/">Do You Want to Build a Snowflake?</a></li>
  </ul>
</body>
</html>
